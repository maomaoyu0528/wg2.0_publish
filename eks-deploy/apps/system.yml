apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-image
spec:
  replicas: 0
  selector:
    matchLabels:
      app: system-image
  template:
    metadata:
      labels:
        app: system-image
    spec:
      containers:
      - name: system-image
        image: 912643663034.dkr.ecr.ap-southeast-1.amazonaws.com/system-image-dapi:202306261526
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2048Mi
        livenessProbe:
          httpGet:
            path: /system/actuator/health/liveness
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /system/actuator/health/readiness
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 3
        startupProbe:
          httpGet:
            path: /system/actuator/health/liveness
            port: 8081
          failureThreshold: 30
          periodSeconds: 10
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: system-image-svc
  labels:
    app: system-image
spec:
  selector:
    app: system-image
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      name: svc-port