apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-image
spec:
  replicas: 0
  selector:
    matchLabels:
      app: web-image
  template:
    metadata:
      labels:
        app: web-image
    spec:
      containers:
      - name: web-image
        image: 912643663034.dkr.ecr.ap-southeast-1.amazonaws.com/web-image-dapi:202306261526
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 4096Mi
        livenessProbe:
          httpGet:
            path: /web/actuator/health/liveness
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /web/actuator/health/readiness
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 3
        startupProbe:
          httpGet:
            path: /web/actuator/health/liveness
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web-image-svc
  labels:
    app: web-image
spec:
  selector:
    app: web-image
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: svc-port