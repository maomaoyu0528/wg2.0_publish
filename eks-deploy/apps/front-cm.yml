apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
data:
  nginx.conf: |
    #user  nobody;
    worker_processes  1;

    #error_log  logs/error.log;
    #error_log  logs/error.log  notice;
    #error_log  logs/error.log  info;

    #pid        logs/nginx.pid;

    events {
        worker_connections  20960;
    }

    http {
        include       mime.types;
        default_type  application/octet-stream;

        #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
        #                  '$status $body_bytes_sent "$http_referer" '
        #                  '"$http_user_agent" "$http_x_forwarded_for"';

        #access_log  logs/access.log  main;
        gzip on;
        gzip_static on;
        gzip_min_length 1k;
        gzip_buffers 4 8k;
        gzip_http_version 1.1;
        gzip_comp_level 6;
        gzip_types text/plain qpplication/x-javascript text/css application/xml text/javascript application/javascript application/json;
        gzip_disable "MSIE [1-6]";
        gzip_vary on;
        access_log off;

        sendfile        on;
        #tcp_nopush     on;
        underscores_in_headers on;
        #keepalive_timeout  0;
        keepalive_timeout  65;
        map $http_upgrade $connection_upgrade {
          default upgrade;
          '' close;
        }
        server_names_hash_bucket_size 256;

        server {
            listen       80;
            
            resolver kube-dns.kube-system.svc.cluster.local valid=10s;
            location /api/ {
                proxy_pass http://web-image-svc.default.svc.cluster.local:8080/web/api/;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_cookie_path  /web /;
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
                if ($request_filename ~* ^.*?.(html|htm)$) {
                    add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate";
                    }
                if ($request_method = 'OPTIONS') {
                        return 204;
                }
            }
            location / {
                try_files $uri $uri/ /index.html;
                root   /usr/share/nginx/efs/saas_10.0_static/yebet;
              index  index.html;
                        proxy_set_header Host $host;
            }

            error_page   500 502 503 504  /50x.html;
            location = /50x.html {
                root   /usr/share/nginx/html;
            }
        }

        server {
            listen       80;
            server_name  ~^agent.*;

            location / {
              try_files $uri $uri/ /index.html;
              root   /usr/share/nginx/efs/saas_10.0_static/agent;
              index  index.html;
              proxy_set_header Host $host;
            }

            resolver kube-dns.kube-system.svc.cluster.local valid=10s;
            location /api/ {
                proxy_pass http://web-image-svc.default.svc.cluster.local:8080/web/api/;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_cookie_path  /web /;
              add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
                if ($request_method = 'OPTIONS') {
                  return 204;
                }
            }

            error_page   500 502 503 504  /50x.html;

            location = /50x.html {
                root /usr/share/nginx/html;
            }
        }
        server {
            listen       80;
            server_name  docsystem.kashu.in;

            location / {
              root   /usr/share/nginx/efs/saas_10.0_static/docsystem;
              index  index.html;
              proxy_set_header Host $host;
            }

            error_page   500 502 503 504  /50x.html;

            location = /50x.html {
                root /usr/share/nginx/html;
            }
        }
        server {
            listen       80;
            server_name  ~^adm.*;
            #access_log  logs/company.log  main;

            resolver kube-dns.kube-system.svc.cluster.local valid=10s;
            location /api/ {
                proxy_pass http://web-image-svc.default.svc.cluster.local:8080/web/api/;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_cookie_path  /web /;
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
                if ($request_method = 'OPTIONS') {
              return 204;
                }
            }

            location / {
              try_files $uri $uri/ /index.html;
              root   /usr/share/nginx/efs/saas_10.0_static/company;
              index  index.html;
            }

            error_page   500 502 503 504  /50x.html;
            location = /50x.html {
                root /usr/share/nginx/html;
            }
        }
        server {
            listen       80;
            server_name  ~^sys.*;
            #access_log  logs/company.log  main;

            resolver kube-dns.kube-system.svc.cluster.local valid=10s;
            location /api/ {
                proxy_pass http://system-image-svc.default.svc.cluster.local:8081/system/api/;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_cookie_path  /system /;
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
                if ($request_method = 'OPTIONS') {
              return 204;
                }
            }

            location / {
              try_files $uri $uri/ /index.html;
              root   /usr/share/nginx/efs/saas_10.0_static/system;
              index  index.html;
            }

            error_page   500 502 503 504  /50x.html;
            location = /50x.html {
                root /usr/share/nginx/html;
            }
        }
        server {
            listen       80;
            server_name  ~^ws.*;
            #access_log  logs/websocket.log  main;
            large_client_header_buffers 8 32k;

            resolver kube-dns.kube-system.svc.cluster.local valid=10s;
            location / {
                proxy_pass http://ws-image-svc.default.svc.cluster.local:8083/ws/;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $host;
                proxy_set_header X-NginX-Proxy true;
                proxy_buffers 8 32k;
                proxy_buffer_size 64k;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_redirect off;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
                add_header Access-Control-Allow-Credentials 'true';
                if ($request_method = "OPTIONS") {
                  add_header Access-Control-Allow-Origin *;
                  add_header Access-Control-Allow-Methods *;
                  add_header Access-Control-Allow-Credentials 'true';
                  add_header Access-Control-Allow-Headers 'X-API-KEY,Origin,X-Requested-With,Content-Type,Accept,Authorization,username,signature';
                  return 204;
                }
            }

            error_page   500 502 503 504  /50x.html;
            location = /50x.html {
                root   /usr/share/nginx/html;
            }
        }
    }