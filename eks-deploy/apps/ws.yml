apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-image
spec:
  replicas: 0
  selector:
    matchLabels:
      app: ws-image
  template:
    metadata:
      labels:
        app: ws-image
    spec:
      containers:
      - name: ws-image
        image: 912643663034.dkr.ecr.ap-southeast-1.amazonaws.com/ws-image-dapi:202306261526
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2048Mi
        livenessProbe:
          httpGet:
            path: /ws/actuator/health/liveness
            port: 8083
          initialDelaySeconds: 3
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /ws/actuator/health/readiness
            port: 8083
          initialDelaySeconds: 3
          periodSeconds: 3
        startupProbe:
          httpGet:
            path: /ws/actuator/health/liveness
            port: 8083
          failureThreshold: 30
          periodSeconds: 10
        ports:
        - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: ws-image-svc
  labels:
    app: ws-image
spec:
  selector:
    app: ws-image
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
      name: svc-port